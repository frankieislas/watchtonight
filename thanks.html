<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchTonight - You're In</title>
  <style>
    :root {
      --bg: #0b1020;
      --text: #eef2ff;
      --muted: #a8b1d1;
      --accent: #7c9cff;
      --border: rgba(255,255,255,0.08);
      --max: 760px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #111935 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      max-width: var(--max);
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
    }
    h1 {
      margin-top: 0;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }
    p {
      color: var(--muted);
      font-size: 1.05rem;
    }
    a {
      display: inline-block;
      margin-top: 18px;
      color: white;
      background: var(--accent);
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You're in.</h1>
    <p>Thanks for joining the WatchTonight early access list.</p>
    <p>We’re building it to help you skip the endless scrolling and get 3 strong movie picks worth watching tonight.</p>
    <p>You’ll hear from us when early access is ready.</p>
    <a href="./">Back to WatchTonight</a>
  </main>
</body>
</html>
